<p id="user-info"></p>
<button onclick="logout()" style="background-color: #836435; border: none; padding: 10px 20px; cursor: pointer;">Se déconnecter</button>
<script>
const user = localStorage.getItem("currentUser");

if (user) {
    document.getElementById("user-info").innerText = "Connecté : " + user;
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}
</script>

<h1>Connexion</h1>

<form id="login-form">
    <input type="text" id="username" placeholder="Nom d'utilisateur" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
</form>

<p>Pas de compte ? <a href="inscription.html">S'inscrire</a></p>


<script>
document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
        localStorage.setItem("currentUser", username);
        alert("Connexion réussie !");
        window.location.href = "index.html";
    } else {
        alert("Identifiants incorrects");
    }
});
</script>
