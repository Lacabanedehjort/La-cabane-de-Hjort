<p id="user-info"></p>
<button onclick="logout()" style="background-color: #836435; border: none; padding: 10px 20px; cursor: pointer;">Se déconnecter</button>

<script>
const user = localStorage.getItem("currentUser");

if (user) {
    document.getElementById("user-info").innerText = "Connecté : " + user;
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}
</script>

<form id="register-form" class="contact">
    <h1>Créer un compte</h1>
    <input type="text" id="lastname" placeholder="Nom" required>
    <input type="text" id="firstname" placeholder="Prénom" required>
    <input type="email" id="email" placeholder="Adresse e-mail" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">S'inscrire</button>
    <p>Déjà un compte ? <a href="login.html">Se connecter</a></p>
</form>


    <section id="mentionslegales" class="about">

</section>

    <p>© 2026 La cabane de Hjort - Tous droits réservés</p>
</footer>
<script>
document.getElementById("register-form").addEventListener("submit", function(e) {
    e.preventDefault();

    const lastname = document.getElementById("lastname").value.trim();
    const firstname = document.getElementById("firstname").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Vérifie si l'adresse e-mail existe déjà
    if (users.find(user => user.email === email)) {
        alert("Un compte existe déjà avec cette adresse e-mail.");
        return;
    }

    const newUser = {
        lastname: lastname,
        firstname: firstname,
        email: email,
        password: password
    };

    users.push(newUser);

    localStorage.setItem("users", JSON.stringify(users));

    alert("Compte créé avec succès !");
    window.location.href = "login.html";
});
</script>
