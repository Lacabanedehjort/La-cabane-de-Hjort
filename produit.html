<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

    emailjs.init("lacabanedehjort@gmail.com");

    const form = document.getElementById("contact-form");

    if (form) {
        form.addEventListener("submit", function(e) {
            e.preventDefault();

            emailjs.sendForm("TON_SERVICE_ID", "TON_TEMPLATE_ID", this)
            .then(function() {
                alert("Message envoyé !");
            }, function(error) {
                alert("Erreur : " + JSON.stringify(error));
            });
        });
    }

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    let panier = JSON.parse(localStorage.getItem("panier")) || [];
    
    const compteur = document.getElementById("cart-count");
    if (compteur) {
        compteur.innerText = panier.length;
    }
});
</script>
<p id="user-info"></p>
<button onclick="logout()" style="background-color: #836435; border: none; padding: 10px 20px; cursor: pointer;">Se déconnecter</button>

<script>
const user = localStorage.getItem("currentUser");

if (user) {
    document.getElementById("user-info").innerText = "Connecté : " + user;
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}
</script>
<script>

function voirMP(id) {

}
</script>
