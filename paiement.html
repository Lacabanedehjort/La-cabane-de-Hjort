<h1>Achat immédiat</h1>

<!-- 🧾 Récap produit -->
<div id="recap"></div>

<!-- 📦 Formulaire -->
<form id="paiement-form">
    <input type="text" id="nom" placeholder="Nom complet" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="text" id="adresse" placeholder="Adresse" required><br><br>

    <button type="submit">Payer</button>
</form>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
window.onload = function() {

    // 🔐 INIT EMAILJS
    emailjs.init("FHFf7MN9Fhd6TisH_");

    const recap = document.getElementById("recap");
    const form = document.getElementById("paiement-form");

    // 🔥 RÉCUPÉRATION PRODUIT
    const produit = JSON.parse(localStorage.getItem("achatDirect"));

    // ❌ Aucun produit
    if (!produit) {
        recap.innerHTML = "<p>❌ Aucun produit sélectionné</p>";
        form.style.display = "none";
        return;
    }

    // ✅ AFFICHAGE PRODUIT
    recap.innerHTML = `
        <h3>Votre achat :</h3>
        <p><strong>${produit.nom}</strong></p>
        <p>Prix : ${produit.prix}€</p>
    `;

    // 🧾 ENVOI FORMULAIRE
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const nom = document.getElementById("nom").value.trim();
        const email = document.getElementById("email").value.trim();
        const adresse = document.getElementById("adresse").value.trim();

        // ❌ Vérification
        if (!nom || !email || !adresse) {
            alert("❌ Merci de remplir tous les champs");
            return;
        }

        // 📧 ENVOI EMAIL
        emailjs.send("service_wsueymf", "template_lgkejta", {
            nom: nom,
            email: email,
            adresse: adresse,
            commande: produit.nom + " - " + produit.prix + "€",
            total: produit.prix + "€",
            frais_port: "0€"
        })
        .then(function() {
            alert("✅ Commande envoyée avec succès !");
            
            // vider produit
            localStorage.removeItem("achatDirect");

            // redirection
            window.location.href = "index.html";
        })
        .catch(function(error) {
            console.error("ERREUR EMAILJS :", error);
            alert("❌ Erreur : " + (error.text || error.message));
        });

    });

};
</script>
