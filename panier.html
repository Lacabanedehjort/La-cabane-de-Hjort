<script>
let panier = JSON.parse(localStorage.getItem("panier")) || [];

function afficherPanier() {
    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    const container = document.getElementById("cart-items");
    const totalElt = document.getElementById("cart-total");

    container.innerHTML = "";
    let total = 0;

    panier.forEach((item, index) => {

        // gérer quantité
        if (!item.quantite) item.quantite = 1;

        total += item.prix * item.quantite;

        const div = document.createElement("div");
        div.classList.add("cart-item");

        div.innerHTML = `
    <div class="cart-left">
        <img src="${item.image || 'placeholder.jpg'}" alt="${item.nom}" width="100" height="100">

        <div class="cart-info">
            <h3>${item.nom}</h3>
            <p>${item.prix} €</p>
        </div>
    </div>

    <div class="cart-actions">
        <button onclick="changerQuantite(${index}, -1)">-</button>
        <span>${item.quantite}</span>
        <button onclick="changerQuantite(${index}, 1)">+</button>
    </div>

    <div class="cart-remove">
        <button onclick="retirerProduit(${index})" style="background-color: #333; color: white;" class="btn btn-danger">
            Supprimer
        </button>
    </div>
`;

        container.appendChild(div);
    });

    totalElt.innerText = "Total : " + total + " €";

    localStorage.setItem("panier", JSON.stringify(panier));
}

function changerQuantite(index, variation) {
    let panier = JSON.parse(localStorage.getItem("panier")) || [];

    if (!panier[index].quantite) panier[index].quantite = 1;

    panier[index].quantite += variation;

    if (panier[index].quantite <= 0) {
        panier.splice(index, 1);
    }

    localStorage.setItem("panier", JSON.stringify(panier));
    afficherPanier();
}

function retirerProduit(index) {
    let panier = JSON.parse(localStorage.getItem("panier")) || [];
    panier.splice(index, 1);
    localStorage.setItem("panier", JSON.stringify(panier));
    afficherPanier();
}

function viderPanier() {
    localStorage.removeItem("panier");
    afficherPanier();
}

function commander() {
    window.location.href = "commande.html";
}

afficherPanier();
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    let panier = JSON.parse(localStorage.getItem("panier")) || [];
    
    const compteur = document.getElementById("cart-count");
    if (compteur) {
        compteur.innerText = panier.length;
    }
});

</script>
<script>   
function updateCartDisplay() {
    const cartItems = document.getElementById("cart-items");
    const emptyCart = document.getElementById("empty-cart");
    const checkoutBtn = document.getElementById("checkout-btn");
    const clearCartBtn = document.getElementById("clear-cart-btn");

    if (cartItems.children.length === 0) {
        emptyCart.style.display = "block";
        checkoutBtn.style.display = "none";
        clearCartBtn.style.display = "none";
    } else {
        emptyCart.style.display = "none";
        checkoutBtn.style.display = "inline-block";
        clearCartBtn.style.display = "inline-block";
    }
}
</script>
